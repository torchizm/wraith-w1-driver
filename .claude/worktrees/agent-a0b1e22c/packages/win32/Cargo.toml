[package]
name = "wraith-daemon"
version = "0.1.0"
edition = "2021"
description = "Wraith W1 Windows daemon — HID + WebSocket + system tray"

[[bin]]
name = "wraith-daemon"
path = "src/main.rs"

[dependencies]
hidapi            = "2.6"
tokio             = { version = "1.37", features = ["full"] }
tokio-tungstenite = "0.21"
futures-util      = "0.3"
serde             = { version = "1.0", features = ["derive"] }
serde_json        = "1.0"
dirs              = "5.0"
uuid              = { version = "1.8", features = ["v4"] }
enigo             = "0.2"
tray-icon         = "0.14"
log               = "0.4"
env_logger        = "0.11"

[dependencies.windows]
version = "0.58"
features = [
    "Win32_Foundation",
    "Win32_UI_WindowsAndMessaging",
    "Win32_UI_Accessibility",
    "Win32_UI_Shell",
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_System_Threading",
    "Win32_System_ProcessStatus",
    "Win32_System_Shutdown",
    "Win32_Security",
]

[build-dependencies]
winresource = "0.1"

[profile.release]
opt-level = 3
lto = true
strip = true
